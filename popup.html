<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Studio Exporter</title>
  <style>
    :root {
      --bg-color: #1a1b1e;
      --card-bg: #25262b;
      --text-primary: #e9ecef;
      --text-secondary: #a5a5a5;
      --accent-color: #667eea;
      --accent-hover: #5a6fd6;
      --border-color: #2c2e33;
      --success-bg: #2b8a3e;
      --success-text: #d3f9d8;
      --error-bg: #c92a2a;
      --error-text: #ffe3e3;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .settings-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      color: var(--text-primary);
      background-color: var(--card-bg);
    }

    .content {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border-color);
    }

    .status {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
    }

    .status.active {
      border-color: #2b8a3e;
      color: #69db7c;
    }

    .status.inactive {
      border-color: #c92a2a;
      color: #ff8787;
    }

    .status-icon {
      font-size: 16px;
    }

    .export-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .export-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .export-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .export-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--border-color);
      color: var(--text-secondary);
    }

    .export-btn.loading {
      opacity: 0.8;
    }

    .export-btn.stop-mode {
      background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%);
    }

    .export-btn.stop-mode:hover {
      box-shadow: 0 4px 12px rgba(201, 42, 42, 0.4);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
    }

    .message.success {
      background-color: rgba(43, 138, 62, 0.2);
      color: #69db7c;
      border: 1px solid rgba(43, 138, 62, 0.3);
      display: block;
    }

    .message.error {
      background-color: rgba(201, 42, 42, 0.2);
      color: #ff8787;
      border: 1px solid rgba(201, 42, 42, 0.3);
      display: block;
    }

    .info {
      margin-top: 15px;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
      text-align: center;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 10px;
      color: var(--text-secondary);
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>AI Studio Exporter</h1>
      <button id="settingsBtn" class="settings-btn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
          </path>
        </svg>
      </button>
    </div>

    <div class="content">
      <div id="status" class="status inactive">
        <span class="status-icon">⚠️</span>
        <span id="statusText">Not on AI Studio</span>
      </div>

      <button id="exportBtn" class="export-btn" disabled>
        <span id="btnText">Export Conversation</span>
      </button>

      <div id="message" class="message"></div>

      <div class="info">
        Navigate to a conversation and click Export to download as ZIP
      </div>
    </div>

    <div class="footer">
      Version 1.0.0
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
